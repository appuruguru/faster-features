name: Build approved feature (claude-api)

# OPTIONAL — only needed if buildRunner = "claude-api".
#
# The Worker handles notifications and the claude-web / copilot build runners on
# its own (via assign-on-create + a GitHub webhook), so nothing has to be copied
# into your repo for those. This workflow exists ONLY for the fully-automated
# Claude API runner, which must run as a GitHub Action. Add it to your repo and
# set an ANTHROPIC_API_KEY secret if you want hands-off CI builds.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    if: github.event.label.name == 'ff:build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Official Anthropic action. Uses an API key — NOT a subscription token
      # (subscription tokens in CI violate Anthropic's ToS as of 2026-04-04).
      - name: Implement with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Implement the request described in issue #${{ github.event.issue.number }}.
            Keep the change small and focused — do not over-engineer or refactor
            unrelated code. Add or update tests if the project has them. When done,
            open a pull request that closes the issue.
