name = "faster-features-ingest"
main = "worker.js"
compatibility_date = "2026-01-01"

# Non-secret config. `npm run setup` overwrites these with your answers.
[vars]
# Repo issues are filed into (owner/name).
GITHUB_REPO = "your-username/your-repo"
# GitHub login assigned to new issues — assignment is what fires the mobile push.
OWNER = "your-username"
# Build runner on the `build` label: claude-web | copilot | claude-api
BUILD_RUNNER = "claude-web"
# Comma-separated sites allowed to POST feedback. "*" = any origin.
ALLOWED_ORIGINS = "https://your-app.com,http://localhost:3000"
# Label that opts an item onto the public roadmap.
ROADMAP_LABEL = "ff:roadmap"
# Optional: serve several of your repos from one Worker (widgets send data-repo).
ALLOWED_REPOS = ""

# Secrets are NOT stored here. `npm run setup` sets them; or manually:
#   wrangler secret put GITHUB_TOKEN     # Issues:write (+ Webhooks:write for auto-hook)
#   wrangler secret put WEBHOOK_SECRET   # verifies GitHub webhook payloads
#   wrangler secret put SHARED_SECRET    # optional

# Roadmap upvoting. Both setup methods create this KV store automatically:
#   • Deploy-to-Cloudflare button: provisions it during the browser flow.
#   • npm run setup: creates and fills the id for you.
# Delete this block to disable upvoting (the Worker turns voting off when VOTES
# isn't bound). A bare `wrangler deploy` needs a real id — use setup or the button.
[[kv_namespaces]]
binding = "VOTES"
id = "replace-me"
