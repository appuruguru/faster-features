# faster-features.config.yml
# Central configuration for the feedback-to-feature pipeline.
# Copy this into the root of the repo that should receive feedback.

# The GitHub repo that issues are created in (owner/name).
repo: your-username/your-repo

# Who gets auto-assigned to new feedback issues (fires their GitHub Mobile push).
# Usually you. Must be a collaborator on `repo`.
owner: your-username

# Pipeline labels — all prefixed `ff:` so they're clearly ours and don't get
# mixed up with GitHub's stock labels (bug, enhancement, …). Created automatically.
labels:
  intake: [ff:feedback, ff:pending-triage] # applied when feedback first lands
  backlog: ff:backlog                      # you add this to shelve it on the board
  build: ff:build                          # you add this to kick off a build
  roadmap: ff:roadmap                      # you add this to show it on the public roadmap
                                           # column derived from status: ff:backlog→Planned,
                                           # ff:build/ff:in-progress→In progress, closed→Shipped

# Where the embeddable widget sends feedback. This is YOUR deployed
# Cloudflare Worker URL (see packages/ingest-worker + docs/deploy-ingest.md).
ingestUrl: https://faster-features-ingest.<your-subdomain>.workers.dev

# Which AI writes the code when you approve a "build".
# See docs/build-runners.md for the full comparison.
#
#   claude-manual : (default) you kick it off in Claude Code (CLI, desktop, or web)
#                   on your Pro/Max subscription. No API token, no per-token cost.
#   copilot       : assign the issue to GitHub Copilot's coding agent (usage-based).
#   claude-api    : automated on the `ff:build` label via the Claude Code Action.
#                   Requires ANTHROPIC_API_KEY secret (pay-per-token).
buildRunner: claude-manual

# Optional: a GitHub Projects (v2) board that `backlog`-labeled issues are added to.
# Leave blank to skip board automation.
projectUrl: ""
